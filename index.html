<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroNexa LK</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f7f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: white; border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .logo { font-size: 48px; margin-bottom: 12px; }
  h1 { color: #1a6e2a; font-size: 28px; margin-bottom: 8px; }
  p { color: #666; margin-bottom: 32px; }
  .btn { display: block; width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; }
  .btn-buyer  { background: #1a6e2a; color: white; }
  .btn-seller { background: #2d8a40; color: white; }
  .btn-admin  { background: #f5f5f5; color: #333; border: 1px solid #ddd; }
  .api { margin-top: 24px; font-size: 13px; color: #999; }
  code { background: #f0f7f0; color: #1a6e2a; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🌾</div>
  <h1>AgroNexa LK</h1>
  <p>Agricultural marketplace connecting farmers & buyers across Sri Lanka</p>
  <a href="/buyer"  class="btn btn-buyer">🛒 Buyer Portal</a>
  <a href="/seller" class="btn btn-seller">🌱 Seller / Farmer Portal</a>
  <a href="/admin"  class="btn btn-admin">⚙️ Admin Panel</a>
  <div class="api">API health: <a href="/api/health"><code>GET /api/health</code></a></div>
</div>
</body>
</html>
